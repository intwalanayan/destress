<svg viewBox="0 0 940 500" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="500" fill="#ffffff"/>
  <text x="470" y="30" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">Walk-through: a cat photo becomes a prediction</text>
  <text x="470" y="52" font-size="12" fill="#6b7280" text-anchor="middle">Rule: the model only speaks numbers. Everything else is prep.</text>

  <!-- STEP 1 -->
  <text x="110" y="85" font-size="12" font-weight="bold" fill="#1f3a68" text-anchor="middle">1. Raw input</text>
  <rect x="30" y="95" width="160" height="150" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <polygon points="80,148 92,118 104,148" fill="#f59e0b"/>
  <polygon points="116,148 128,118 140,148" fill="#f59e0b"/>
  <circle cx="110" cy="180" r="42" fill="#f59e0b"/>
  <circle cx="98" cy="175" r="4" fill="#1f2937"/>
  <circle cx="122" cy="175" r="4" fill="#1f2937"/>
  <circle cx="110" cy="188" r="2.5" fill="#1f2937"/>
  <path d="M 100 195 Q 110 202 120 195" fill="none" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="72" y1="188" x2="52" y2="185" stroke="#1f2937" stroke-width="1"/>
  <line x1="72" y1="194" x2="52" y2="196" stroke="#1f2937" stroke-width="1"/>
  <line x1="148" y1="188" x2="168" y2="185" stroke="#1f2937" stroke-width="1"/>
  <line x1="148" y1="194" x2="168" y2="196" stroke="#1f2937" stroke-width="1"/>
  <text x="110" y="265" font-size="10" fill="#6b7280" text-anchor="middle">a photo (224×224 pixels)</text>
  <text x="110" y="279" font-size="10" fill="#6b7280" text-anchor="middle">not usable directly</text>

  <text x="215" y="180" font-size="26" fill="#94a3b8" text-anchor="middle">→</text>

  <!-- STEP 2 -->
  <text x="330" y="85" font-size="12" font-weight="bold" fill="#1f3a68" text-anchor="middle">2. Convert every pixel to numbers  (this is the "prep" step)</text>
  <rect x="240" y="95" width="190" height="150" rx="8" fill="#f0f7ff" stroke="#4a7fd4" stroke-width="2"/>
  <g font-family="Menlo, monospace" font-size="9" fill="#1f3a68">
    <text x="255" y="115">(255,180,90)</text>
    <text x="335" y="115">(240,170,80)</text>
    <text x="255" y="132">(250,175,85)</text>
    <text x="335" y="132">(235,165,75)</text>
    <text x="255" y="149">( 20, 20,25)</text>
    <text x="335" y="149">( 25, 25,30)</text>
    <text x="255" y="166">( 20, 20,25)</text>
    <text x="335" y="166">( 25, 25,30)</text>
    <text x="255" y="183">(230,170,80)</text>
    <text x="335" y="183">(240,175,85)</text>
    <text x="255" y="200">(210,150,70)</text>
    <text x="335" y="200">(225,160,75)</text>
    <text x="290" y="222" font-size="8" fill="#6b7280">… (small excerpt of the full grid)</text>
  </g>
  <text x="335" y="265" font-size="10" fill="#6b7280" text-anchor="middle">each pixel = 3 numbers (Red, Green, Blue)</text>
  <text x="335" y="279" font-size="10" font-weight="bold" fill="#1f3a68" text-anchor="middle">total: 224 × 224 × 3 = 150,528 numbers</text>

  <text x="455" y="180" font-size="26" fill="#94a3b8" text-anchor="middle">→</text>

  <!-- STEP 3 -->
  <text x="590" y="85" font-size="12" font-weight="bold" fill="#1f3a68" text-anchor="middle">3. Chain of equations (the "model")</text>
  <rect x="480" y="95" width="220" height="150" rx="8" fill="#e8f5e2" stroke="#5aa845" stroke-width="2"/>

  <rect x="495" y="107" width="190" height="30" rx="5" fill="#ffffff" stroke="#5aa845"/>
  <text x="590" y="126" font-size="11" fill="#2d5c1e" text-anchor="middle">Layer 1 — find edges</text>

  <rect x="495" y="145" width="190" height="30" rx="5" fill="#ffffff" stroke="#5aa845"/>
  <text x="590" y="164" font-size="11" fill="#2d5c1e" text-anchor="middle">Layer 2 — find shapes</text>

  <rect x="495" y="183" width="190" height="30" rx="5" fill="#ffffff" stroke="#5aa845"/>
  <text x="590" y="202" font-size="11" fill="#2d5c1e" text-anchor="middle">Layer 3 — find animal parts</text>

  <text x="590" y="230" font-size="10" font-style="italic" fill="#2d5c1e" text-anchor="middle">each layer = math + tuned knobs</text>

  <text x="590" y="265" font-size="10" fill="#6b7280" text-anchor="middle">numbers flow top → bottom</text>
  <text x="590" y="279" font-size="10" fill="#6b7280" text-anchor="middle">layer types picked by a researcher</text>

  <text x="725" y="180" font-size="26" fill="#94a3b8" text-anchor="middle">→</text>

  <!-- STEP 4 -->
  <text x="830" y="85" font-size="12" font-weight="bold" fill="#1f3a68" text-anchor="middle">4. Output + verdict</text>
  <rect x="750" y="95" width="160" height="150" rx="8" fill="#f3e8fd" stroke="#9b59d0" stroke-width="2"/>
  <text x="830" y="130" font-size="14" fill="#5b2d85" text-anchor="middle">Cat:  0.92</text>
  <text x="830" y="155" font-size="14" fill="#5b2d85" text-anchor="middle">Dog:  0.08</text>
  <text x="830" y="180" font-size="10" fill="#6b7280" text-anchor="middle">(confidence scores)</text>
  <line x1="770" y1="195" x2="890" y2="195" stroke="#9b59d0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="830" y="222" font-size="20" font-weight="bold" fill="#5b2d85" text-anchor="middle">"CAT"</text>
  <text x="830" y="265" font-size="10" fill="#6b7280" text-anchor="middle">bigger number wins</text>

  <!-- BOTTOM BOX -->
  <rect x="30" y="320" width="880" height="160" rx="10" fill="#fff8e6" stroke="#e08c2f" stroke-width="1.5"/>
  <text x="50" y="345" font-size="14" font-weight="bold" fill="#7a4408">What actually happens in each layer?</text>
  <text x="50" y="370" font-size="12" fill="#7a4408">Each layer is the same primitive as our exam-score equation, just repeated for many numbers at once:</text>
  <text x="65" y="398" font-size="13" font-family="Menlo, monospace" fill="#2d3748">output = f( knob₁·input₁ + knob₂·input₂ + knob₃·input₃ + … + baseline )</text>
  <text x="50" y="428" font-size="12" fill="#7a4408">A researcher <tspan font-weight="bold">designed the layer types</tspan> (edges → shapes → parts) after noticing images have spatial patterns.</text>
  <text x="50" y="452" font-size="12" fill="#7a4408">Training then chose <tspan font-weight="bold">every knob value</tspan> by comparing predictions with millions of labeled photos, over and over.</text>
</svg>
