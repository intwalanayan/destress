<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="32" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">Precision vs. Recall — a spam filter with 100 emails</text>
  <text x="480" y="54" font-size="12" fill="#6b7280" text-anchor="middle">Why "accuracy" alone can lie, and how the two numbers together tell the real story.</text>

  <!-- Setup panel -->
  <rect x="30" y="80" width="900" height="60" rx="10" fill="#f0f7ff" stroke="#4a7fd4" stroke-width="1.5"/>
  <text x="50" y="103" font-size="13" font-weight="bold" fill="#1f3a68">Setup:</text>
  <text x="50" y="123" font-size="12" fill="#1f3a68">100 emails arrive. Truth: 40 are actual spam, 60 are legitimate. Our spam filter marks 30 emails as spam. Was it a good filter?</text>

  <!-- Confusion matrix -->
  <text x="480" y="170" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">Confusion matrix — the four boxes any classifier fits into</text>

  <!-- Row/col labels -->
  <text x="480" y="200" font-size="11" font-weight="bold" fill="#1f2937" text-anchor="middle">Actual truth →</text>

  <rect x="290" y="215" width="180" height="40" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="380" y="240" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Actually SPAM (40)</text>

  <rect x="470" y="215" width="180" height="40" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="560" y="240" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Actually NOT SPAM (60)</text>

  <!-- Predicted spam row -->
  <rect x="110" y="255" width="180" height="90" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="200" y="290" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Filter marked</text>
  <text x="200" y="308" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">as SPAM (30)</text>

  <rect x="290" y="255" width="180" height="90" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="380" y="285" font-size="24" font-weight="bold" fill="#166534" text-anchor="middle">25</text>
  <text x="380" y="308" font-size="11" fill="#166534" text-anchor="middle">True Positive</text>
  <text x="380" y="322" font-size="10" fill="#166534" text-anchor="middle">(correctly caught spam)</text>

  <rect x="470" y="255" width="180" height="90" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="560" y="285" font-size="24" font-weight="bold" fill="#7a1d1d" text-anchor="middle">5</text>
  <text x="560" y="308" font-size="11" fill="#7a1d1d" text-anchor="middle">False Positive</text>
  <text x="560" y="322" font-size="10" fill="#7a1d1d" text-anchor="middle">(good email killed)</text>

  <!-- Predicted not spam row -->
  <rect x="110" y="345" width="180" height="90" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="200" y="380" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Filter marked</text>
  <text x="200" y="398" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">as NOT SPAM (70)</text>

  <rect x="290" y="345" width="180" height="90" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="380" y="375" font-size="24" font-weight="bold" fill="#78350f" text-anchor="middle">15</text>
  <text x="380" y="398" font-size="11" fill="#78350f" text-anchor="middle">False Negative</text>
  <text x="380" y="412" font-size="10" fill="#78350f" text-anchor="middle">(spam slipped through)</text>

  <rect x="470" y="345" width="180" height="90" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="560" y="375" font-size="24" font-weight="bold" fill="#1e40af" text-anchor="middle">55</text>
  <text x="560" y="398" font-size="11" fill="#1e40af" text-anchor="middle">True Negative</text>
  <text x="560" y="412" font-size="10" fill="#1e40af" text-anchor="middle">(good email delivered)</text>

  <!-- Metrics computation -->
  <rect x="670" y="255" width="260" height="180" rx="8" fill="#fff8e6" stroke="#e08c2f" stroke-width="1"/>
  <text x="685" y="277" font-size="12" font-weight="bold" fill="#7a4408">Computed metrics</text>

  <text x="685" y="302" font-size="11" font-weight="bold" fill="#7a4408">Accuracy</text>
  <text x="685" y="318" font-size="10" font-family="Menlo, monospace" fill="#7a4408">(25+55) / 100 = 80%</text>
  <text x="685" y="333" font-size="9" fill="#6b7280">(overall correctness)</text>

  <text x="685" y="356" font-size="11" font-weight="bold" fill="#166534">Precision</text>
  <text x="685" y="372" font-size="10" font-family="Menlo, monospace" fill="#166534">25 / (25+5) = 83%</text>
  <text x="685" y="387" font-size="9" fill="#6b7280">"of things flagged, how many really were?"</text>

  <text x="685" y="410" font-size="11" font-weight="bold" fill="#7a4408">Recall</text>
  <text x="685" y="426" font-size="10" font-family="Menlo, monospace" fill="#7a4408">25 / (25+15) = 63%</text>
  <text x="685" y="441" font-size="9" fill="#6b7280">"of real cases, how many did we catch?"</text>

  <!-- Interpretation -->
  <rect x="30" y="460" width="900" height="145" rx="10" fill="#f0fdf4" stroke="#5aa845" stroke-width="1.5"/>
  <text x="50" y="483" font-size="14" font-weight="bold" fill="#2d5c1e">Why we need both — the trade-off:</text>
  <text x="50" y="505" font-size="12" fill="#2d5c1e"><tspan font-weight="bold">Precision high, recall low</tspan> = strict filter. Rarely wrong when it flags, but misses lots of real cases. (Legal doc search: precision matters — false positives waste hours.)</text>
  <text x="50" y="523" font-size="12" fill="#2d5c1e"><tspan font-weight="bold">Recall high, precision low</tspan> = paranoid filter. Catches almost everything, but many false alarms. (Cancer screening: recall matters — missing a case is worse than a false alarm.)</text>
  <text x="50" y="547" font-size="12" fill="#2d5c1e"><tspan font-weight="bold">F1 score</tspan> combines both into one number (a specific kind of average). Use when you want a single number that penalises being lopsided.</text>
  <text x="50" y="571" font-size="12" fill="#2d5c1e"><tspan font-weight="bold">Which one matters for you?</tspan> Depends on which mistake hurts more. For our Phase 2 EEG stress detector, missing a real stress event (low recall) matters more than an occasional false alarm.</text>
  <text x="50" y="595" font-size="12" font-style="italic" fill="#166534"><tspan font-weight="bold">Accuracy alone can lie:</tspan> a filter that marks ALL emails as "not spam" gets 60% accuracy on this data — but 0% recall. Useless. That's why we track precision + recall.</text>
</svg>
