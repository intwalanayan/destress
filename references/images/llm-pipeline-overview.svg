<svg viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="420" fill="#ffffff"/>
  <text x="480" y="32" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">Inside an LLM: what happens between your prompt and one output token</text>
  <text x="480" y="54" font-size="12" fill="#6b7280" text-anchor="middle">Every stage is deterministic math on numbers. The whole loop runs once per generated token.</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a7fd4"/>
    </marker>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9b59d0"/>
    </marker>
  </defs>

  <!-- Stage 1: Text -->
  <rect x="30" y="90" width="120" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="90" y="115" font-size="12" font-weight="bold" fill="#78350f" text-anchor="middle">Your text</text>
  <text x="90" y="135" font-size="11" font-family="Menlo, monospace" fill="#78350f" text-anchor="middle">"Hello EEG"</text>
  <text x="90" y="170" font-size="10" fill="#6b7280" text-anchor="middle">raw string</text>

  <line x1="153" y1="120" x2="185" y2="120" stroke="#4a7fd4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 2: Tokenizer -->
  <rect x="190" y="90" width="120" height="60" rx="8" fill="#e2eefc" stroke="#4a7fd4" stroke-width="1.5"/>
  <text x="250" y="112" font-size="12" font-weight="bold" fill="#1f3a68" text-anchor="middle">Tokenizer</text>
  <text x="250" y="130" font-size="10" fill="#1f3a68" text-anchor="middle">split text into</text>
  <text x="250" y="144" font-size="10" fill="#1f3a68" text-anchor="middle">chunks + look up IDs</text>
  <text x="250" y="170" font-size="10" font-family="Menlo, monospace" fill="#6b7280" text-anchor="middle">→ [15496, 44451]</text>

  <line x1="313" y1="120" x2="345" y2="120" stroke="#4a7fd4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 3: Embeddings -->
  <rect x="350" y="90" width="120" height="60" rx="8" fill="#e8f5e2" stroke="#5aa845" stroke-width="1.5"/>
  <text x="410" y="112" font-size="12" font-weight="bold" fill="#2d5c1e" text-anchor="middle">Embedding</text>
  <text x="410" y="128" font-size="10" fill="#2d5c1e" text-anchor="middle">each ID → vector of</text>
  <text x="410" y="142" font-size="10" fill="#2d5c1e" text-anchor="middle">~4,096 numbers</text>
  <text x="410" y="170" font-size="10" font-family="Menlo, monospace" fill="#6b7280" text-anchor="middle">→ [[0.1, -0.4, …]]</text>

  <line x1="473" y1="120" x2="505" y2="120" stroke="#4a7fd4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 4: Transformer -->
  <rect x="510" y="80" width="180" height="80" rx="8" fill="#f3e8fd" stroke="#9b59d0" stroke-width="2"/>
  <text x="600" y="102" font-size="12" font-weight="bold" fill="#5b2d85" text-anchor="middle">Transformer layers (×N)</text>
  <text x="600" y="120" font-size="10" fill="#5b2d85" text-anchor="middle">attention lets each token</text>
  <text x="600" y="134" font-size="10" fill="#5b2d85" text-anchor="middle">"look at" others → context</text>
  <text x="600" y="148" font-size="10" fill="#5b2d85" text-anchor="middle">refined by many layers</text>
  <text x="600" y="180" font-size="10" font-family="Menlo, monospace" fill="#6b7280" text-anchor="middle">Qwen3-8B: 36 layers</text>

  <line x1="693" y1="120" x2="725" y2="120" stroke="#4a7fd4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 5: Logits -->
  <rect x="730" y="90" width="90" height="60" rx="8" fill="#fdeede" stroke="#e08c2f" stroke-width="1.5"/>
  <text x="775" y="112" font-size="12" font-weight="bold" fill="#7a4408" text-anchor="middle">Logits</text>
  <text x="775" y="128" font-size="10" fill="#7a4408" text-anchor="middle">a score for</text>
  <text x="775" y="142" font-size="10" fill="#7a4408" text-anchor="middle">EVERY word</text>
  <text x="775" y="170" font-size="10" font-family="Menlo, monospace" fill="#6b7280" text-anchor="middle">~152K scores</text>

  <line x1="823" y1="120" x2="855" y2="120" stroke="#4a7fd4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 6: Sampler -->
  <rect x="860" y="90" width="80" height="60" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="900" y="112" font-size="12" font-weight="bold" fill="#7a1d1d" text-anchor="middle">Sampler</text>
  <text x="900" y="128" font-size="10" fill="#7a1d1d" text-anchor="middle">pick ONE</text>
  <text x="900" y="142" font-size="10" fill="#7a1d1d" text-anchor="middle">next token</text>
  <text x="900" y="170" font-size="10" font-family="Menlo, monospace" fill="#6b7280" text-anchor="middle">"signal"</text>

  <!-- Loop back -->
  <path d="M 900 155 Q 900 240, 500 240 Q 100 240, 90 155" fill="none" stroke="#9b59d0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ar2)"/>
  <text x="490" y="265" font-size="12" fill="#5b2d85" text-anchor="middle" font-weight="bold">↺ append the new token, run the whole thing again</text>
  <text x="490" y="282" font-size="11" font-style="italic" fill="#5b2d85" text-anchor="middle">this is called "autoregressive generation" — one token per pass</text>

  <!-- Stage labels below -->
  <rect x="30" y="315" width="910" height="90" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="50" y="338" font-size="13" font-weight="bold" fill="#1f2937">Reading rule:</text>
  <text x="50" y="358" font-size="12" fill="#1f2937">You type <tspan font-family="Menlo, monospace">text</tspan>. The model only speaks <tspan font-family="Menlo, monospace">numbers</tspan>. The tokenizer + embedding stages translate in; the sampler + tokenizer</text>
  <text x="50" y="376" font-size="12" fill="#1f2937">translate back out. In between, the transformer layers do the "thinking" — but "thinking" is just matrix multiplications on those numbers.</text>
  <text x="50" y="395" font-size="12" fill="#1f2937">The reply you see is the model running this whole pipeline once per token, streaming out one word-piece at a time.</text>
</svg>
